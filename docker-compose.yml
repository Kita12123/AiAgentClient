version: '3.8'

services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./:/app:rw
    depends_on:
      - db
    command: ["python", "src/main.py"]

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aiagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: {}
